<div class="form-container">
    <header class="page-header">
        <div class="breadcrumb">
            <span>MedNex</span> / <span class="active">Schedule Appointment</span>
        </div>
        <div class="header-main">
            <h1>{{ isEditMode ? 'Edit Appointment' : 'New Appointment' }}</h1>
            <p>{{ isEditMode ? 'Update the details for this appointment.' : 'Fill in the details below to schedule a new
                patient appointment.' }}</p>
        </div>
    </header>

    <div class="form-card card">
        <form [formGroup]="form" (ngSubmit)="submit()">

            <!-- Error Banner -->
            <div class="error-banner" *ngIf="submitError"
                style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:1rem;border-radius:12px;margin-bottom:1.5rem;font-size:0.875rem;">
                ⚠️ {{ submitError }}
            </div>

            <div class="form-grid">
                <!-- Patient Select -->
                <div class="form-group">
                    <label for="patientId">Patient</label>
                    <select id="patientId" formControlName="patientId">
                        <option value="" disabled>— Select a patient —</option>
                        <option *ngFor="let p of patients()" [value]="p.id">
                            {{ p.firstName || p.fullName }} {{ p.lastName || '' }}
                        </option>
                    </select>
                    <span class="hint" *ngIf="patients().length === 0" style="color:#94a3b8;font-size:0.75rem;">Loading
                        patients...</span>
                </div>

                <!-- Doctor Select -->
                <div class="form-group">
                    <label for="doctorId">Doctor / Specialist</label>
                    <select id="doctorId" formControlName="doctorId">
                        <option value="" disabled>— Select a doctor —</option>
                        <option *ngFor="let d of doctors()" [value]="d.id">
                            {{ d.fullName }} <span *ngIf="d.specialization">({{ d.specialization }})</span>
                        </option>
                    </select>
                    <span class="hint" *ngIf="doctors().length === 0" style="color:#94a3b8;font-size:0.75rem;">Loading
                        doctors...</span>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label for="date">Appointment Date</label>
                    <input id="date" type="date" formControlName="date">
                </div>

                <!-- Slot Selection Grid -->
                <div class="form-group" style="grid-column: 1 / -1;" *ngIf="slots().length > 0">
                    <label>Available Slots</label>
                    <div class="slots-grid"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; margin-top: 0.5rem;">
                        <button type="button" *ngFor="let slot of slots()" (click)="selectSlot(slot)"
                            [disabled]="slot.status === 'BOOKED'"
                            [style.background]="slot.status === 'BOOKED' ? '#fee2e2' : (selectedSlot() === slot ? '#3b82f6' : 'white')"
                            [style.color]="slot.status === 'BOOKED' ? '#991b1b' : (selectedSlot() === slot ? 'white' : '#1e293b')"
                            [style.border]="selectedSlot() === slot ? '2px solid #3b82f6' : '1px solid #e2e8f0'"
                            style="padding: 0.75rem 0.5rem; border-radius: 8px; font-size: 0.813rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s;">
                            {{ slot.time }}
                            <div style="font-size: 0.625rem; opacity: 0.8;">{{ slot.status }}</div>
                        </button>
                    </div>
                </div>

                <!-- Type -->
                <div class="form-group">
                    <label for="type">Appointment Type</label>
                    <select id="type" formControlName="type">
                        <option value="CONSULTATION">👨‍⚕️ Consultation</option>
                        <option value="FOLLOW_UP">📅 Follow-up</option>
                        <option value="SURGERY">✂️ Surgery</option>
                        <option value="DIAGNOSTIC">🔬 Diagnostic</option>
                    </select>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" formControlName="status">
                        <option value="BOOKED">Confirmed</option>
                        <option value="PENDING">Pending</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" routerLink="/appointments">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="form.invalid || isSubmitting">
                    <span *ngIf="isSubmitting">Saving...</span>
                    <span *ngIf="!isSubmitting">{{ isEditMode ? 'Update Appointment' : 'Schedule Appointment' }}</span>
                </button>
            </div>
        </form>
    </div>
</div>
