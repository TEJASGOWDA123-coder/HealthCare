<div class="login-wrapper">
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon">
                <span class="material-icons-round">security</span>
            </div>
            <h1 class="logo-text">Secure <span>Verification</span></h1>
        </div>

        <!-- QR Card -->
        <div class="qr-card">
            <div class="user-info" *ngIf="targetUser()">
                <p>Verifying session for:</p>
                <strong>{{ targetUser() }}</strong>
            </div>

            <div class="qr-frame" [class.expired]="isExpired()">
                <div class="qr-overlay" *ngIf="isExpired()" (click)="refreshQr()">
                    <span class="material-icons-round refresh-icon">refresh</span>
                    <p>Verification Link Expired</p>
                    <button class="btn-refresh">Generate New Link</button>
                </div>

                <div class="qr-placeholder" *ngIf="!qrData() && !isExpired()">
                    <div class="pulse-ring"></div>
                    <span class="material-icons-round">qr_code_2</span>
                </div>

                <qrcode *ngIf="isBrowser && qrData() && !isExpired()" [qrdata]="qrData()!" [width]="300"
                    [errorCorrectionLevel]="'L'" [margin]="4" [colorDark]="'#0f172a'" [colorLight]="'#ffffff'">
                </qrcode>
            </div>

            <div class="instruction-box">
                <p class="instruction-text">Scan this code with your mobile device to complete your login securely</p>
                <div class="timer-badge" [class.warning]="timeLeft() < 10 && !isExpired()">
                    <span class="material-icons-round">timer</span>
                    <span>QR expires in {{ timeLeft() }}s</span>
                </div>
            </div>

            <button class="btn-primary-ghost" (click)="refreshQr()" [disabled]="!qrData() || isExpired()">
                <span class="material-icons-round">refresh</span>
                Refresh QR Code
            </button>

            <!-- Dev Simulation Bypass -->
            <div
                style="margin-top: 1rem; width: 100%; border-top: 1px dashed #e2e8f0; padding-top: 1rem; text-align: center;">
                <p style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem;">Development Simulation</p>
                <button class="btn-simulation" (click)="simulateMobileAuth()"
                    style="width: 100%; padding: 0.625rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.813rem; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.2s;">
                    Simulate Mobile Scan
                </button>
            </div>
        </div>

        <button class="btn-back" (click)="cancel()">
            <span class="material-icons-round">arrow_back</span>
            Back to standard login
        </button>
    </div>
</div>

<style>
    .login-wrapper {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f8fafc;
        background-image:
            radial-gradient(at 0% 0%, rgba(96, 165, 250, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
        padding: 2rem;
    }

    .login-container {
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
    }

    .logo-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
    }

    .logo-icon {
        width: 48px;
        height: 48px;
        background: white;
        border-radius: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.2);
    }

    .logo-icon .material-icons-round {
        color: #3b82f6;
        font-size: 28px;
    }

    .logo-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
        letter-spacing: -0.025em;
        margin: 0;
    }

    .logo-text span {
        color: #64748b;
        font-weight: 500;
    }

    .qr-card {
        width: 100%;
        background: white;
        border-radius: 32px;
        padding: 3rem 2.5rem;
        box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid rgba(226, 232, 240, 1);
    }

    .user-info {
        text-align: center;
        margin-bottom: 2rem;
        background: #fdf2f2;
        padding: 1rem 1.5rem;
        border-radius: 16px;
        border: 1px solid #fee2e2;
        width: 100%;
    }

    .user-info p {
        margin: 0;
        font-size: 0.813rem;
        color: #ef4444;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
    }

    .user-info strong {
        display: block;
        color: #1e293b;
        font-size: 1.125rem;
        margin-top: 0.25rem;
    }

    .qr-frame {
        width: 280px;
        height: 280px;
        background: #f1f5f9;
        border-radius: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        margin-bottom: 2rem;
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
    }

    .qr-frame.expired {
        filter: grayscale(1);
        opacity: 0.8;
    }

    .qr-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        cursor: pointer;
    }

    .refresh-icon {
        font-size: 48px;
        color: #3b82f6;
        margin-bottom: 0.5rem;
    }

    .qr-overlay p {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 1rem;
    }

    .btn-refresh {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
    }

    .qr-placeholder {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .qr-placeholder .material-icons-round {
        font-size: 64px;
        color: #94a3b8;
    }

    .pulse-ring {
        position: absolute;
        width: 100px;
        height: 100px;
        border: 2px solid #3b82f6;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% {
            transform: scale(0.8);
            opacity: 0.8;
        }

        100% {
            transform: scale(1.5);
            opacity: 0;
        }
    }

    .instruction-box {
        text-align: center;
        margin-bottom: 2rem;
    }

    .instruction-text {
        color: #475569;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 1rem;
        max-width: 280px;
    }

    .timer-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #f1f5f9;
        padding: 0.5rem 1rem;
        border-radius: 100px;
        color: #64748b;
        font-size: 0.875rem;
        font-weight: 600;
    }

    .timer-badge.warning {
        background: #fef2f2;
        color: #ef4444;
        animation: wiggle 0.5s ease infinite;
    }

    @keyframes wiggle {

        0%,
        100% {
            transform: rotate(0deg);
        }

        25% {
            transform: rotate(-2deg);
        }

        75% {
            transform: rotate(2deg);
        }
    }

    .btn-primary-ghost {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        color: #3b82f6;
        border: 1px solid #3b82f6;
        padding: 0.75rem 1.5rem;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-primary-ghost:hover:not(:disabled) {
        background: rgba(59, 130, 246, 0.05);
        transform: translateY(-1px);
    }

    .btn-primary-ghost:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        border-color: #cbd5e1;
        color: #94a3b8;
    }

    .btn-back {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        border: none;
        color: #64748b;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.2s ease;
    }

    .btn-back:hover {
        color: #1e293b;
    }

    .btn-back .material-icons-round {
        font-size: 18px;
    }
</style>
